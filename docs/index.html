<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Random Strings</title>
  <meta name="description" content="Generate cryptographically secure random strings with customizable character sets.">
  <meta name="author" content="alarky">
  <!-- OGP -->
  <meta property="og:title" content="Random Strings - Secure Random String Generator">
  <meta property="og:description" content="Generate cryptographically secure random strings with customizable character sets.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://randstr.alarky.dev/">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Random Strings - Secure Random String Generator">
  <meta name="twitter:description" content="Generate cryptographically secure random strings with customizable character sets.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="main.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js"></script>
</head>
<body>
  <main class="container" x-data="randstr()" x-init="generate()">
    <h1><a href=".">Random Strings</a></h1>

    <div class="grid">
      <label>
        count
        <input type="text" x-model.number="count" @input="onChange()">
      </label>
      <label>
        length
        <input type="text" x-model.number="length" @input="onChange()">
      </label>
      <label>
        &nbsp;
        <div class="btn-group">
          <button @click="generate()">Generate</button>
          <button class="secondary" @click="reset()">Reset</button>
        </div>
      </label>
    </div>

    <fieldset>
      <label><input type="checkbox" x-model="useLowers" @change="onChange()">a-z</label>
      <label><input type="checkbox" x-model="useUppers" @change="onChange()">A-Z</label>
      <label><input type="checkbox" x-model="useDigits" @change="onChange()">0-9</label>
      <label><input type="checkbox" x-model="useSymbols" @change="toggleAllSymbols()">symbols</label>
      <label class="symbol-max">
        max:<input type="text" x-model.number="symbolMax" @input="onChange()" size="3">%
      </label>
    </fieldset>

    <div class="symbols-grid">
      <template x-for="s in symbolsRow1" :key="s">
        <label class="symbol-item">
          <input type="checkbox" :checked="symbols[s]" @change="toggleSymbol(s, $event.target.checked)">
          <span x-text="s"></span>
        </label>
      </template>
    </div>
    <div class="symbols-grid">
      <template x-for="s in symbolsRow2" :key="s">
        <label class="symbol-item">
          <input type="checkbox" :checked="symbols[s]" @change="toggleSymbol(s, $event.target.checked)">
          <span x-text="s"></span>
        </label>
      </template>
    </div>

    <ul class="results">
      <template x-for="(s, i) in results" :key="i">
        <li @click="copy(s, i, $event)" :class="copiedIndex === i && 'copied'" x-text="s"></li>
      </template>
    </ul>
  </main>

  <footer>
    <a href="https://alarky.dev" class="github-btn" target="_blank" rel="noopener">

      alarky.dev

</body>
</html>
